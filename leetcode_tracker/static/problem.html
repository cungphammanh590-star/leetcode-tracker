<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>题目详情 · LeetCode Tracker</title>
  <style>
    :root {
      --bg: #f4f1eb;
      --ink: #1c1917;
      --muted: #78716c;
      --card: #fffcf7;
      --line: #e7e5e4;
      --ok: #15803d;
      --warn: #b45309;
      --accent: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Noto Sans SC", system-ui, sans-serif;
      background:
        radial-gradient(1200px 500px at 10% -10%, #d9f3ef 0%, transparent 55%),
        radial-gradient(900px 400px at 100% 0%, #fde68a55 0%, transparent 50%),
        var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
      padding: 28px 24px 8px;
      max-width: 960px;
      margin: 0 auto;
    }
    h1 { margin: 0; font-size: 26px; letter-spacing: -0.03em; }
    .sub { color: var(--muted); margin-top: 8px; font-size: 14px; line-height: 1.5; }
    .back { font-size: 13px; display: inline-block; margin-bottom: 10px; }
    main { max-width: 960px; margin: 0 auto; padding: 12px 24px 40px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #e7e5e4;
      color: #44403c;
    }
    .diff-easy { color: #15803d; }
    .diff-medium { color: #b45309; }
    .diff-hard { color: #b91c1c; }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 16px 0 20px;
    }
    .metric {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
    }
    .metric .label { font-size: 12px; color: var(--muted); }
    .metric .value { font-size: 22px; font-weight: 650; margin-top: 6px; }
    section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    h2 { margin: 0 0 10px; font-size: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-weight: 500; }
    .ok { color: var(--ok); }
    .bad { color: #b91c1c; }
    .pill {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #f5f5f4;
    }
    .pill-improved { background: #dcfce7; color: #166534; }
    .pill-stuck { background: #fee2e2; color: #991b1b; }
    .pill-declined { background: #ffedd5; color: #9a3412; }
    .pill-first_ac { background: #ccfbf1; color: #115e59; }
    .breakdown { font-size: 13px; line-height: 1.7; color: #44403c; }
    #status { font-size: 12px; color: var(--muted); }
    .empty { color: var(--muted); font-size: 13px; padding: 8px 0; }
    @media (max-width: 800px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <a class="back" href="/">← 返回仪表盘</a>
    <h1 id="title">题目详情</h1>
    <div class="sub" id="meta">加载中…</div>
    <div class="tags" id="tags"></div>
  </header>
  <main>
    <div class="grid" id="metrics"></div>

    <section>
      <h2>终身错误分布</h2>
      <div class="breakdown" id="breakdown">—</div>
    </section>

    <section>
      <h2>时间线</h2>
      <table>
        <tbody id="timeline"></tbody>
      </table>
    </section>

    <section>
      <h2>每日提交情况</h2>
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>尝试</th>
            <th>AC</th>
            <th>错题</th>
            <th>连续天数</th>
            <th>状态变化</th>
            <th>当日分布</th>
          </tr>
        </thead>
        <tbody id="daily"></tbody>
      </table>
    </section>

    <section>
      <h2>提交记录</h2>
      <table>
        <thead>
          <tr><th>时间</th><th>状态</th><th>用时</th><th>语言</th></tr>
        </thead>
        <tbody id="submissions"></tbody>
      </table>
    </section>
  </main>
  <script>
    function problemIdFromPath() {
      const m = location.pathname.match(/\/problems\/(\d+)\/?$/);
      return m ? Number(m[1]) : null;
    }

    function formatStatusCounts(counts, excludeAccepted) {
      const entries = Object.entries(counts || {});
      const filtered = excludeAccepted
        ? entries.filter(([s]) => s !== "Accepted")
        : entries;
      return filtered
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
        .map(([status, count]) => status + " ×" + count)
        .join("，") || "—";
    }

    function statusChangeLabel(code) {
      const map = {
        first_ac: "首次 AC",
        improved: "进步",
        declined: "退步",
        stuck: "卡住",
      };
      return map[code] || code || "—";
    }

    function statusChangeClass(code) {
      if (!code) return "pill";
      return "pill pill-" + code;
    }

    function diffClass(diff) {
      if (diff === "Easy") return "diff-easy";
      if (diff === "Medium") return "diff-medium";
      if (diff === "Hard") return "diff-hard";
      return "";
    }

    function formatDuration(seconds) {
      if (seconds == null) return "尚未 AC";
      if (seconds < 60) return seconds + " 秒";
      if (seconds < 3600) return Math.round(seconds / 60) + " 分钟";
      const h = Math.floor(seconds / 3600);
      const m = Math.round((seconds % 3600) / 60);
      return h + " 小时" + (m ? " " + m + " 分" : "");
    }

    function leetcodeUrl(slug) {
      if (!slug || /^problem-\d+$/i.test(slug)) return null;
      return "https://leetcode.cn/problems/" + encodeURIComponent(slug) + "/";
    }

    function renderMetrics(p) {
      const items = [
        ["总尝试", p.total_attempts],
        ["AC 次数", p.accepted_count],
        ["通过率", Math.round((p.acceptance_rate || 0) * 1000) / 10 + "%"],
        ["挣扎指数", Math.round((p.struggle_score || 0) * 100) + "%"],
        ["最近 AC 间隔", p.avg_attempts_to_ac != null ? p.avg_attempts_to_ac + " 次" : "—"],
        ["首次 AC 耗时", formatDuration(p.solve_time_seconds)],
        ["最近状态", p.last_status || "—"],
        ["最近提交", p.last_submitted_at || "—"],
      ];
      document.getElementById("metrics").innerHTML = items
        .map(
          ([label, value]) =>
            '<div class="metric"><div class="label">' +
            label +
            '</div><div class="value">' +
            value +
            "</div></div>"
        )
        .join("");
    }

    function renderTimeline(p) {
      const rows = [
        ["首次尝试", p.first_attempt_at || "—"],
        ["最近尝试", p.last_attempt_at || "—"],
        ["首次 AC", p.first_accepted_at || "尚未 AC"],
      ];
      document.getElementById("timeline").innerHTML = rows
        .map(([k, v]) => "<tr><th>" + k + "</th><td>" + v + "</td></tr>")
        .join("");
    }

    async function load() {
      const pid = problemIdFromPath();
      if (!pid) {
        document.getElementById("meta").textContent = "无效的题号";
        return;
      }
      try {
        const res = await fetch("/api/problems/" + pid + "/stats");
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        const p = data.problem;
        const url = leetcodeUrl(p.title_slug);
        const diff = p.difficulty || "未知";
        document.getElementById("title").textContent = p.problem_id + ". " + p.title;
        document.title = p.problem_id + ". " + p.title + " · LeetCode Tracker";
        document.getElementById("meta").innerHTML =
          '<span class="' +
          diffClass(diff) +
          '">' +
          diff +
          "</span>" +
          (url
            ? ' · <a href="' + url + '" target="_blank" rel="noopener">在 leetcode.cn 打开</a>'
            : "") +
          ' · <span id="status">已更新 ' +
          new Date().toLocaleTimeString() +
          "</span>";

        const tags = p.topic_tags || [];
        document.getElementById("tags").innerHTML = tags.length
          ? tags.map((t) => '<span class="tag">' + t + "</span>").join("")
          : '<span class="tag">无标签</span>';

        renderMetrics(p);
        document.getElementById("breakdown").textContent = formatStatusCounts(
          p.status_breakdown,
          false
        );

        renderTimeline(p);

        const daily = document.getElementById("daily");
        if (!data.daily || !data.daily.length) {
          daily.innerHTML = '<tr><td colspan="7" class="empty">暂无每日记录</td></tr>';
        } else {
          daily.innerHTML = data.daily
            .map((d) => {
              const change = d.status_change;
              const flags = [];
              if (d.is_new_today) flags.push("新题");
              if (d.is_review_today) flags.push("复习");
              const flagText = flags.length ? "（" + flags.join("，") + "）" : "";
              return (
                "<tr><td>" +
                d.day +
                flagText +
                "</td><td>" +
                d.attempts +
                "</td><td class='ok'>" +
                d.accepted_today +
                "</td><td>" +
                d.wrong_today +
                "</td><td>" +
                d.consecutive_days +
                "</td><td><span class='" +
                statusChangeClass(change) +
                "'>" +
                statusChangeLabel(change) +
                "</span></td><td>" +
                formatStatusCounts(d.status_breakdown, false) +
                "</td></tr>"
              );
            })
            .join("");
        }

        const subs = document.getElementById("submissions");
        if (!data.submissions || !data.submissions.length) {
          subs.innerHTML = '<tr><td colspan="4" class="empty">暂无提交记录</td></tr>';
        } else {
          subs.innerHTML = data.submissions
            .map((s) => {
              const cls = s.status === "Accepted" ? "ok" : "bad";
              const runtime = s.runtime_ms != null ? s.runtime_ms + "ms" : "—";
              return (
                "<tr><td>" +
                s.submitted_at +
                "</td><td class='" +
                cls +
                "'>" +
                s.status +
                "</td><td>" +
                runtime +
                "</td><td>" +
                (s.language || "—") +
                "</td></tr>"
              );
            })
            .join("");
        }
      } catch (err) {
        document.getElementById("meta").textContent = "加载失败：" + err;
      }
    }

    load();
    setInterval(load, 5000);
  </script>
</body>
</html>
