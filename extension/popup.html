<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>LeetCode Tracker</title>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        margin: 0;
        padding: 12px 14px;
        width: 280px;
        color: #1a1a1a;
        background: #f7f7f5;
      }
      h1 { font-size: 14px; margin: 0 0 8px; }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
        margin: 6px 0;
      }
      .ok { color: #0a7a3e; font-weight: 600; }
      .bad { color: #b00020; font-weight: 600; }
      .muted { color: #666; font-size: 11px; line-height: 1.4; margin-top: 10px; }
      code { font-size: 11px; background: #ebeae6; padding: 1px 4px; border-radius: 3px; }
      button {
        width: 100%;
        margin-top: 8px;
        border: 0;
        border-radius: 6px;
        padding: 8px;
        background: #0f766e;
        color: #fff;
        font-size: 12px;
        cursor: pointer;
      }
      button.secondary {
        background: #e7e5e4;
        color: #44403c;
      }
      button:disabled {
        background: #d6d3d1;
        color: #a8a29e;
        cursor: not-allowed;
      }
      #last { margin-top: 8px; font-size: 11px; word-break: break-word; }
    </style>
  </head>
  <body>
    <h1>LeetCode Tracker</h1>
    <div class="row"><span>本机桥接</span><span id="bridge">检测中…</span></div>
    <div class="row"><span>库内提交数</span><span id="count">—</span></div>
    <div id="last" class="muted">最近一次：尚无记录</div>
    <p class="muted">
      仅支持 <code>leetcode.cn</code>。请先打开本机 App 或运行
      <code>leetcode-tracker serve</code>，再在题目页提交。
    </p>
    <button id="open-dashboard" type="button" disabled>打开仪表盘</button>
    <button id="refresh" class="secondary" type="button">重新检测</button>
    <script src="popup.js"></script>
  </body>
</html>
